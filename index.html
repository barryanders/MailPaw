<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MailPaw</title>
  <meta name="robots" content="noindex,follow">
  <meta name="theme-color" content="#f6f7f9">
  <meta http-equiv="refresh" content="0; url=app.html">
  <link rel="canonical" href="https://barryanders.github.io/MailPaw/app.html">
  <link rel="icon" type="image/png" href="mailpaw-icon-64.png">
  <script>
    window.location.replace('app.html' + window.location.search + window.location.hash);
  </script>
  <style>
    :root {
      color-scheme: light;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #111827;
      background: #f6f7f9;
    }
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    main {
      display: grid;
      gap: 16px;
      justify-items: center;
      text-align: center;

    img {
      width: 72px;
      height: 72px;
      border-radius: 20px;
      box-shadow: 0 18px 44px rgba(15, 23, 42, 0.14);
    }
    p {
      margin: 0;
      color: #64748b;
      font-size: 16px;
    }
    a {
      color: #111827;
      font-weight: 800;
    }
  </style>
</head>
<body>
  <main>
    <img src="mailpaw-icon.png" alt="">
    <p>Opening MailPaw...</p>
    <p><a href="app.html">Open MailPaw</a></p>
  </main>

</html>
