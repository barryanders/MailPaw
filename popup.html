<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MailPaw</title>
  <link rel="stylesheet" href="css/popup.css">
</head>
<body>
  <div class="popup-shell">
    <header class="popup-header">
      <div class="popup-title">
        <span class="popup-logo-mark" aria-hidden="true">
          <img src="mailpaw-icon-64.png" alt="">
        </span>
        <span class="popup-title-text">MailPaw</span>
      </div>
      <span class="status-badge" id="plan-badge">Free</span>
    </header>
    <section class="status-card">
      <h2>MailPaw</h2>
      <p id="status-copy">Free email template builder with local storage and exportable backups.</p>
      <div class="status-actions">
        <button class="btn btn-primary" id="open-gmail">Open Gmail</button>
      </div>
    </section>
  </div>
  <script src="popup.js"></script>
</body>
</html>
